# 上游服务器（Next.js 应用）
upstream nextjs_upstream {
    server web:3000;
    keepalive 64;
}

# .net 和 .cn 跳转到 .com（HTTP）
server {
    listen 80;
    listen [::]:80;
    server_name piaociyuan.net www.piaociyuan.net piaociyuan.cn www.piaociyuan.cn;

    # Let's Encrypt 验证（申请证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 http://piaociyuan.com$request_uri;
    }
}

# www 跳转到裸域名（HTTP）
server {
    listen 80;
    listen [::]:80;
    server_name www.piaociyuan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 http://piaociyuan.com$request_uri;
    }
}

# 主站（piaociyuan.com）
server {
    listen 80;
    listen [::]:80;
    server_name piaociyuan.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 代理到 Next.js
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 32k;
    }

    # Socket.io WebSocket 支持
    location /socket.io/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 静态资源缓存
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
