name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/piaoyuzhou-web

jobs:
  # Step 1: Build validation
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: cd apps/web && npx tsc --noEmit
        continue-on-error: true

      - name: Lint check
        run: cd apps/web && npx next lint
        continue-on-error: true

  # Step 2: Build and push Docker image
  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 3: Deploy to production (requires manual approval for workflow_dispatch)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/piaociyuan/"

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          command_timeout: 30m
          script: |
            # 登录GitHub Container Registry
            echo $GHCR_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # 拉取最新镜像
            docker pull ghcr.io/viosus/piaociyuan/piaoyuzhou-web:latest

            # 更新本地镜像标签
            docker tag ghcr.io/viosus/piaociyuan/piaoyuzhou-web:latest piaoyuzhou-web:latest

            # 重启服务
            cd ~/piaociyuan
            docker-compose down
            docker-compose up -d --no-build

            # 等待容器就绪后同步数据库 schema
            sleep 10
            docker-compose exec -T web npx prisma db push --skip-generate

            # 清理旧镜像
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 30
          if [ -n "${{ secrets.ECS_HOST }}" ]; then
            echo "Deployment completed. Please verify health at https://piaociyuan.com/api/health"
          fi
