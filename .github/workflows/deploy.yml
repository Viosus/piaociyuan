name: Deploy to ECS

# 部署策略（2026-05-01 重构）：
# - 抛弃 GHCR build/push 链路（详见 CLAUDE.md "不得再犯的错误"）
# - CI 只做 validate（typecheck），通过后 SSH 到 ECS 跑 git pull + docker compose build
# - ECS 本地 build = 项目原生路径（docker-compose.yml 的 build: 段 + Dockerfile 国内镜像优化）

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/web && npx prisma generate

      - name: Type check
        run: cd apps/web && npx tsc --noEmit

      - name: Lint check
        run: cd apps/web && npx next lint
        continue-on-error: true

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/piaociyuan

            echo "=== git fetch + reset to origin/main ==="
            git fetch origin
            # reset --hard 用于清掉 ECS 上历史 scp 推过的 docker-compose.yml 等本地 drift
            # 任何未 commit 的修改都会被覆盖（这是 deploy 的预期行为）
            git reset --hard origin/main

            echo "=== docker compose build web ==="
            docker compose build web

            echo "=== docker compose up -d web ==="
            docker compose up -d web

            echo "=== waiting for container health ==="
            sleep 15

            echo "=== prisma schema sync ==="
            docker compose exec -T web npx prisma db push --skip-generate

            echo "=== clean up dangling images ==="
            docker image prune -f

            echo "=== deployment OK ==="
            docker compose ps

      - name: Health check
        run: |
          echo "Waiting for service to fully boot..."
          sleep 20
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://piaociyuan.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
          curl -sS https://piaociyuan.com/api/health
