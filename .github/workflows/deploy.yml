name: Deploy to ECS

# 部署策略（2026-05-01 重构）：
# - 抛弃 GHCR build/push 链路（详见 CLAUDE.md "不得再犯的错误"）
# - CI 只做 validate（typecheck），通过后 SSH 到 ECS 跑 git pull + docker compose build
# - ECS 本地 build = 项目原生路径（docker-compose.yml 的 build: 段 + Dockerfile 国内镜像优化）

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/web && npx prisma generate

      - name: Type check
        run: cd apps/web && npx tsc --noEmit

      - name: Lint check
        run: cd apps/web && npx next lint
        continue-on-error: true

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/piaociyuan

            echo "=== git fetch + reset to origin/main ==="
            git fetch origin
            # reset --hard 用于清掉 ECS 上历史 scp 推过的 docker-compose.yml 等本地 drift
            # 任何未 commit 的修改都会被覆盖（这是 deploy 的预期行为）
            git reset --hard origin/main

            echo "=== docker compose build web ==="
            docker compose build web

            echo "=== stop + wait + remove web (block until daemon-side fully clean) ==="
            # 之前 docker compose rm -f -s 的问题：命令返回成功 = API 调用接受，
            # 但 daemon 实际删除是异步的。下一秒 up 撞上"removal in progress"。
            # 这次用 docker stop + docker wait 阻塞到容器真正退出，再 rm，再 polling
            # docker inspect 直到失败（确认对象彻底从 daemon 消失），才进入 up。
            container_id=$(docker ps -aq --filter "name=piaociyuan-web" | head -1)
            if [ -n "$container_id" ]; then
              echo "Found existing container: $container_id"
              # 30s graceful stop（允许 web 自己 SIGTERM 退出，避免数据丢失）
              docker stop -t 30 "$container_id" 2>/dev/null || true
              # 阻塞直到容器进入 exited 状态（daemon 端真停了）
              docker wait "$container_id" 2>/dev/null || true
              # 强删
              docker rm -f "$container_id" 2>/dev/null || true

              # 轮询 inspect，直到 daemon 报"No such container"
              # (docker inspect 失败 = 对象彻底从 daemon 状态机消失)
              for i in $(seq 1 30); do
                if ! docker inspect "$container_id" >/dev/null 2>&1; then
                  echo "✓ container $container_id fully removed (took ${i}s)"
                  break
                fi
                sleep 1
              done
            else
              echo "No existing piaociyuan-web container, skip cleanup"
            fi

            # 还有"游离"容器（手动 rename 残留 / 异常退出留下的带前缀僵尸）也清掉
            stragglers=$(docker ps -aq --filter "name=piaociyuan-web")
            if [ -n "$stragglers" ]; then
              echo "Cleaning up straggler containers: $stragglers"
              echo "$stragglers" | xargs -r docker rm -f 2>/dev/null || true
              sleep 3
            fi

            echo "=== pre-up state check ==="
            docker ps -a --filter "name=piaociyuan-web" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}" || true

            # docker compose up 在某些 compose v2 版本里有内部 race：create 调用
            # 在 daemon 端创建成功（容器 ID 已分配），但 compose CLI 返回非零并
            # 报"name in use by <new-id>"。实际 daemon 端 container 已经在跑。
            # 解法：先 try compose up；若 exit 非零，看 daemon 端是不是其实在跑；
            # 在跑就当成功，没在跑就按名字暴力删 + 重试一次。
            echo "=== docker compose up -d --force-recreate web (with race-resilient retry) ==="
            compose_up() {
              docker compose up -d --force-recreate --remove-orphans web
            }

            if ! compose_up; then
              echo "⚠ compose up exit non-zero; checking daemon side..."
              docker ps -a --filter "name=piaociyuan-web" --format "table {{.ID}}\t{{.Names}}\t{{.Status}}" || true

              if docker ps --filter "name=piaociyuan-web" --filter "status=running" -q | grep -q .; then
                echo "✓ container is actually running on daemon side—compose CLI false-alarm, continuing"
              else
                echo "✗ container truly not running; brute-force rm by name + retry"
                docker rm -f piaociyuan-web 2>/dev/null || true
                # 等 daemon 端 namespace 释放
                sleep 8
                if ! compose_up; then
                  echo "::error::compose up still fails after brute-force retry"
                  docker ps -a --filter "name=piaociyuan-web" || true
                  exit 1
                fi
                echo "✓ compose up succeeded on retry"
              fi
            fi

            echo "=== waiting for container health ==="
            sleep 15

            echo "=== prisma schema sync ==="
            docker compose exec -T web npx prisma db push --skip-generate

            echo "=== clean up dangling images ==="
            docker image prune -f

            echo "=== container status ==="
            docker compose ps

            echo "=== health check (local curl) ==="
            # 在 ECS 本地 curl，避免 GitHub runner 跨海连接被防火墙拦截
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (HTTP 200) on attempt $i"
                curl -sS http://localhost:3000/api/health
                echo
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "::error::Health check failed after 6 attempts"
            docker compose logs web --tail=30
            exit 1
