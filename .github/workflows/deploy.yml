name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io
  # 写死小写避免 ghcr push 大小写不匹配（github.repository = Viosus/piaociyuan，含大写）
  IMAGE_NAME: viosus/piaociyuan/piaociyuan-web

jobs:
  # Step 1: Build validation
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/web && npx prisma generate

      - name: Type check
        run: cd apps/web && npx tsc --noEmit

      - name: Lint check
        run: cd apps/web && npx next lint
        continue-on-error: true

  # Step 2: Build and push Docker image
  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # Build with build-push-action（注意：之前发现这个 action 在 push 失败时会
      # 静默成功，所以下面跟一个手动 push 兜底，把真实错误暴露出来）
      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 直接 docker manifest inspect 看 build-push-action 是否真的 push 上去了
      # 如果没 push，下面手动 docker push 会抛真实错误信息
      - name: Diagnose push state with raw docker
        if: always()
        run: |
          set +e
          echo "=== build_push action outputs ==="
          echo "imageid: ${{ steps.build_push.outputs.imageid }}"
          echo "digest:  ${{ steps.build_push.outputs.digest }}"
          echo "metadata: ${{ steps.build_push.outputs.metadata }}"
          echo
          echo "=== docker manifest inspect :sha ==="
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "exit=$?"
          echo
          echo "=== docker manifest inspect :latest ==="
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "exit=$?"
          echo
          echo "=== docker images locally ==="
          docker images
          echo
          echo "=== curl GHCR API directly to list tags ==="
          AUTH_TOKEN=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          curl -sS -H "Authorization: Basic $AUTH_TOKEN" \
            https://ghcr.io/v2/${{ env.IMAGE_NAME }}/tags/list || echo "curl failed"

      # 显式验证 :latest tag 真的指向了刚 build 的 image
      # 之前 5 次 deploy 链路就是因为 build-push-action 静默 noop 导致 :latest 没更新
      - name: Verify :latest tag was actually pushed
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          SHA_ID=$(docker inspect --format='{{.Id}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }})
          LATEST_ID=$(docker inspect --format='{{.Id}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest)
          echo "SHA tag points to:    $SHA_ID"
          echo "LATEST tag points to: $LATEST_ID"
          if [ "$SHA_ID" != "$LATEST_ID" ]; then
            echo "::error:::latest tag did not update — push assertion failed"
            exit 1
          fi

  # Step 3: Deploy to production (requires manual approval for workflow_dispatch)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Sync docker-compose.yml to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/piaociyuan/"

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          command_timeout: 30m
          script: |
            # 登录GitHub Container Registry
            echo $GHCR_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # 拉取最新镜像
            docker pull ghcr.io/viosus/piaociyuan/piaociyuan-web:latest

            # 更新本地镜像标签
            docker tag ghcr.io/viosus/piaociyuan/piaociyuan-web:latest piaociyuan-web:latest

            # 重启服务
            cd ~/piaociyuan
            docker-compose down
            docker-compose up -d --no-build

            # 等待容器就绪后同步数据库 schema
            sleep 10
            docker-compose exec -T web npx prisma db push --skip-generate

            # 清理旧镜像
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 30
          if [ -n "${{ secrets.ECS_HOST }}" ]; then
            echo "Deployment completed. Please verify health at https://piaociyuan.com/api/health"
          fi
